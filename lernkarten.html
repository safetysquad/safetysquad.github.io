<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Lernkarten</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>📚 Lernkarten</h1>
  <div class="stats">
    <div>Erledigt<br><b id="done">0</b></div>
    <div>Merkliste<br><b id="mark">0</b></div>
  </div>
</header>

<main class="card-container">
  <div class="card" id="card"></div>
</main>

<div class="controls">
  <button onclick="prev()">⬅<br>Zurück</button>
  <button onclick="flip()">🔁<br>Antwort</button>
  <button class="mark" onclick="mark()">❌<br>Merken</button>
  <button class="done" onclick="done()">✅<br>Erledigt</button>
  <button onclick="next()">➡<br>Weiter</button>
</div>

<script src="lernkartenData.js"></script>
<script src="lernkarten.js"></script>
</body>
</html>
