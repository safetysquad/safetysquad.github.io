<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Testmodus – SAFETY SQUAD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>📝 Testmodus</h2>

  <div class="app">
    <div id="progressBar"></div>
  </div>
  <div id="progressText">0%</div>

  <div class="top-buttons">
    <button onclick="toggleMerkliste()">⭐ Nur Merkliste</button>
    <a href="statistik.html">📊 Statistik</a>
    <a href="index.html">🏠 Startseite</a>
  </div>

  <div class="card" id="card">
    <div id="question"></div>
  </div>

  <div class="action-buttons">
    <button onclick="addToMerkliste()">⭐ Merkliste</button>
    <button onclick="markFalse()">❌ Falsch</button>
    <button onclick="markTrue()">✅ Richtig</button>
  </div>

  <div class="nav-buttons">
    <button onclick="prevCard()">⬅ Zurück</button>
    <button onclick="nextCard()">Weiter ➡</button>
  </div>

  <div class="counter">
    <span id="cardCounter"></span> |
    ⭐ Merkliste: <span id="merkCount"></span>
  </div>

  <script src="lernkartenData.js"></script>
  <script src="lernkarten.js"></script>
</body>
</html>
