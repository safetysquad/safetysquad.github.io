<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Lernkarteikarten – SAFETY SQUAD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">

    <!-- HEADER -->
    <header>
      <h1>📝 Testmodus</h1>
      <p id="counterText">Karte 1 von 51</p>
    </header>

    <!-- PROGRESS -->
    <div class="progress-container">
      <div id="progressText">0%</div>
      <div class="progress">
        <div id="progressBar"></div>
      </div>
    </div>

    <!-- TOP BUTTONS -->
    <div class="top-buttons">
      <button onclick="toggleMarkMode()">⭐ Nur Merkliste</button>
      <a href="statistik.html">📊 Statistik</a>
      <a href="index.html">🏠 Startseite</a>
    </div>

    <!-- CARD -->
    <div class="card" id="cardText">
      Lade Karte...
    </div>

    <!-- ACTION BUTTONS -->
    <div class="action-buttons">
      <button class="mark" onclick="markCard()">⭐ Merkliste</button>
      <button class="wrong" onclick="wrongCard()">❌ Falsch</button>
      <button class="correct" onclick="doneCard()">✅ Richtig</button>
    </div>

    <!-- NAV -->
    <div class="nav-buttons">
      <button onclick="prevCard()">⬅ Zurück</button>
      <button onclick="nextCard()">➡ Weiter</button>
    </div>

  </div>

  <script src="lernkarteikartenData.js"></script>
  <script src="lernkarteikarten.js"></script>
</body>
</html>
