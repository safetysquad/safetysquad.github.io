<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>SAFETY SQUAD – Statistik</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>📊 Statistik</h1>
  <p>Dein Lernfortschritt</p>
</header>

<main class="stats-page">

  <div class="stat-box">
    <p>📄 Gesamt Karten</p>
    <b id="totalCards">0</b>
  </div>

  <div class="stat-box">
    <p>✅ Erledigt</p>
    <b id="doneCards">0</b>
  </div>

  <div class="stat-box">
    <p>⭐ Merkliste</p>
    <b id="markCards">0</b>
  </div>

  <div class="stat-box">
    <p>📊 Fortschritt</p>
    <b id="percentDone">0%</b>
  </div>

  <div class="progress" style="margin-top:1rem;">
    <div id="progressBar"></div>
  </div>

  <div class="top-buttons" style="margin-top:2rem;">
    <a class="link-btn" href="index.html">🏠 Start</a>
    <button class="reset" onclick="resetAll()">🧹 Fortschritt löschen</button>
  </div>

</main>

<script src="data.js"></script>
<script src="stats.js"></script>
</body>
</html>
