<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>📊 Statistik</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>📊 Statistik</h1>
</header>

<main class="card">
  <p id="statsText"></p>

  <div class="buttons">
    <button onclick="reset()">🧹 Reset</button>
    <a href="test.html" class="link-btn">🔁 Neuer Test</a>
    <a href="index.html" class="link-btn">🏠 Startseite</a>
  </div>
</main>

<script>
const stats = JSON.parse(localStorage.getItem("testStats")) || {
  correct: 0,
  wrong: 0,
  runs: 0
};

const total = stats.correct + stats.wrong;
const percent = total ? Math.round((stats.correct / total) * 100) : 0;

document.getElementById("statsText").innerText =
`Durchgänge: ${stats.runs}
Richtig: ${stats.correct}
Falsch: ${stats.wrong}
Ergebnis: ${percent}%`;

function reset() {
  if (!confirm("Alles zurücksetzen?")) return;
  localStorage.removeItem("testStats");
  localStorage.removeItem("markedCards");
  location.reload();
}
</script>

</body>
</html>
