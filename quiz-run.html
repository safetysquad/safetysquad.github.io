<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>SAFETY SQUAD – Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<div class="app">

  <header>
    <h1 id="quizTitle">Quiz</h1>

    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <p id="counter" style="margin-top:8px; opacity:.8;"></p>
  </header>

  <main>
    <!-- FRAGE -->
    <div class="card">
      <p id="questionText"></p>
    </div>

    <!-- ANTWORTEN -->
    <div id="answers" class="action-buttons"></div>

    <!-- NAVIGATION -->
    <div class="nav">
      <button class="btn warn" onclick="prevQuestion()">⬅ Zurück</button>
      <button class="btn" onclick="nextQuestion()">➡ Weiter</button>
    </div>
  </main>

</div>

<script src="quiz-data.js"></script>
<script src="quiz-run.js"></script>
</body>
</html>
