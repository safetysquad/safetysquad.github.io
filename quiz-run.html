<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>SAFETY SQUAD – Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<div class="app">

<header>
  <h1>📝 SAFETY SQUAD</h1>
  <p id="quizTitle">Quiz</p>

  <div class="progress">
    <div id="progressBar"></div>
  </div>

  <div class="stats">
    <div>📄 Frage<br><b id="questionCounter">1 / 10</b></div>
    <div>⭐ Punkte<br><b id="points">0</b></div>
  </div>
</header>

<main>

  <div class="card">
    <p id="questionText">Lade Frage…</p>
  </div>

  <div id="answers" class="quiz-answers"></div>

  <button class="done" onclick="submitAnswer()">Antwort bestätigen</button>

</main>

</div>

<script src="quiz-data.js"></script>
<script src="quiz-script.js"></script>
</body>
</html>
