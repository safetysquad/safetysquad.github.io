<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>SAFETY SQUAD – Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

<header>
  <h1 id="quizTitle">Quiz</h1>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <p id="counter"></p>
</header>

<main>
  <div class="card">
    <p id="questionText"></p>
  </div>

  <div id="answers" class="actions"></div>

  <div class="nav">
    <button class="btn warn" onclick="prevQuestion()">⬅ Zurück</button>
    <button class="btn" onclick="nextQuestion()">➡ Weiter</button>
  </div>
</main>

</div>

<!-- WICHTIG: Reihenfolge -->
<script src="quiz-data.js"></script>
<script src="quiz-run.js"></script>
</body>
</html>
