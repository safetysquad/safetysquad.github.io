<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>📝 Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>📝 Testmodus</h1>

  <div class="progress-wrap">
    <div class="progress">
      <div id="progressBar"></div>
    </div>
    <div id="progressText">0%</div>
  </div>

  <div class="top-buttons">
    <button onclick="toggleMode()">⭐ Nur Merkliste</button>
    <a href="stats.html" class="link-btn">📊 Statistik</a>
    <a href="index.html" class="link-btn">🏠 Startseite</a>
  </div>
</header>

<main>
  <div class="card">
    <p id="cardText"></p>
  </div>

  <div class="buttons">
    <button onclick="mark()">⭐ Merkliste</button>
    <button onclick="wrong()">❌ Falsch</button>
    <button onclick="correct()">✅ Richtig</button>
  </div>
</main>

<script src="data.js"></script>
<script src="test.js"></script>
</body>
</html>
