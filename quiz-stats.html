<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Quiz Auswertung</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<div class="app">

<header>
  <h1>📊 Quiz Auswertung</h1>
</header>

<main id="result"></main>

<div class="buttons">
  <a href="index.html" class="link-btn">⬅ Startseite</a>
  <a href="quiz-repeat.html" class="done">🔁 Falsche Fragen üben</a>
</div>

</div>

<script>
const data = JSON.parse(localStorage.getItem("quizResult"));
const div = document.getElementById("result");

if (!data) {
  div.innerHTML = "<p>Keine Daten vorhanden.</p>";
} else {
  div.innerHTML = `
    <p><b>Punkte:</b> ${data.points} / ${data.total}</p>
    <p><b>Falsche Fragen:</b> ${data.wrongQuestions.length}</p>
  `;
}
</script>
</body>
</html>
